<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThreadCraft | Login / Signup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="nav wrap nav-plain">
    <a class="brand" href="index.html">ThreadCraft</a>
    <ul class="menu">
      <li><a href="index.html">Shop</a></li>
      <li><a href="cart.html">Cart</a></li>
      <li><a href="checkout.html">Checkout</a></li>
      <li><a href="orders.html">Orders</a></li>
      <li><a href="admin.html">Admin</a></li>
    </ul>
  </nav>

  <main class="wrap page-main auth-main">
    <section class="auth-card">
      <h1>Account Access</h1>
      <div class="auth-tabs" role="tablist" aria-label="Authentication tabs">
        <button class="auth-tab active" data-tab="login">Login</button>
        <button class="auth-tab" data-tab="signup">Sign Up</button>
      </div>

      <form id="loginForm" class="auth-form">
        <label>Email</label>
        <input type="email" id="loginEmail" required>
        <label>Password</label>
        <input type="password" id="loginPassword" minlength="6" required>
        <button class="btn btn-primary" type="submit">Login</button>
      </form>

      <form id="signupForm" class="auth-form hidden">
        <label>Full Name</label>
        <input type="text" id="signupName" required>
        <label>Email</label>
        <input type="email" id="signupEmail" required>
        <label>Password</label>
        <input type="password" id="signupPassword" minlength="6" required>
        <button class="btn btn-primary" type="submit">Create Account</button>
      </form>

      <button class="btn btn-ghost hidden" id="logoutBtn" type="button">Logout</button>
      <p class="auth-status" id="authStatus"></p>
          </section>
  </main>

  <div class="toast" id="toast" aria-live="polite"></div>

  <script src="app.js"></script>
  <script src="auth.js"></script>
</body>
</html>
